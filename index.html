<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Shenry: Caminata Infinita</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #0a0805; }
      #instrucciones {
        position: fixed; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); color: white;
        display: flex; justify-content: center; align-items: center;
        z-index: 1000; font-family: sans-serif; text-align: center; cursor: pointer;
      }
      #hud {
        position: fixed; top: 20px; left: 20px; color: #ff69b4;
        font-family: monospace; font-size: 20px; z-index: 100;
        background: rgba(0,0,0,0.5); padding: 10px;
      }
    </style>
  </head>
  <body>

    <div id="instrucciones">
      <div>
        <h1>CIUDAD LIMEÑA: CAMINATA DE PAZ</h1>
        <p>Haz CLICK para entrar</p>
        <p>W, A, S, D para caminar | MOUSE para mirar</p>
        <p style="color: #00ff00;">Suelo 100% Sólido - Imposible caer</p>
      </div>
    </div>

    <div id="hud">NIÑAS RESCATADAS: <span id="puntos">0</span>/5</div>

    <a-scene>
      <a-sky color="#0a0805"></a-sky>

      <a-entity id="cuerpo" position="0 0 5">
        <a-entity id="camara" camera look-controls="pointerLockEnabled: true" position="0 1.6 0">
            <a-light type="spot" intensity="2" distance="30" color="#fff" angle="40"></a-light>
        </a-entity>
      </a-entity>

      <a-plane position="0 0 0" rotation="-90 0 0" width="10000" height="10000" color="#0f0f0f"></a-plane>
      
      <a-entity id="ciudad">
        <a-box class="obstaculo" position="-10 5 -15" width="8" height="10" depth="8" color="#1a1a1a"></a-box>
        <a-box class="obstaculo" position="20 7 -30" width="10" height="14" depth="10" color="#222"></a-box>
        <a-box class="obstaculo" position="-25 4 20" width="12" height="8" depth="12" color="#111"></a-box>
        
        <a-entity class="farol" position="5 0 -5">
            <a-cylinder color="#333" radius="0.15" height="4"></a-cylinder>
            <a-sphere position="0 4 0" radius="0.3" color="#ffaa00" material="shader:flat"></a-sphere>
            <a-light type="point" intensity="1.5" distance="15" color="#ffaa00" position="0 3.8 0"></a-light>
        </a-entity>
      </a-entity>

      <a-text class="nena" value="Y" color="#ff69b4" position="5 1.2 -10" align="center" width="15"></a-text>
      <a-text class="nena" value="Y" color="#ff69b4" position="-15 1.2 -20" align="center" width="15"></a-text>
      <a-text class="nena" value="Y" color="#ff69b4" position="15 1.2 15" align="center" width="15"></a-text>

      <a-text id="franchis" value="X" color="red" position="10 1.2 -25" align="center" width="20"></a-text>

    </a-scene>

    <script>
      let score = 0;
      let activo = false;
      let miPos = { x: 0, z: 5 };
      let teclas = {};

      const cuerpo = document.querySelector('#cuerpo');
      const camara = document.querySelector('#camara');
      const villano = document.querySelector('#franchis');
      const nenas = document.querySelectorAll('.nena');
      const obstaculos = document.querySelectorAll('.obstaculo');
      const faroles = document.querySelectorAll('.farol');

      document.body.addEventListener('click', () => {
        camara.components['look-controls'].requestPointerLock();
        document.querySelector('#instrucciones').style.display = 'none';
        activo = true;
      });

      window.onkeydown = (e) => teclas[e.code] = true;
      window.onkeyup = (e) => teclas[e.code] = false;

      function frame() {
        if (activo) {
          let antX = miPos.x;
          let antZ = miPos.z;

          // Movimiento basado en la mirada
          let rot = camara.getAttribute('rotation').y * Math.PI / 180;
          let speed = 0.12;

          if (teclas['KeyW']) { miPos.x -= Math.sin(rot) * speed; miPos.z -= Math.cos(rot) * speed; }
          if (teclas['KeyS']) { miPos.x += Math.sin(rot) * speed; miPos.z += Math.cos(rot) * speed; }
          if (teclas['KeyA']) { miPos.x -= Math.cos(rot) * speed; miPos.z += Math.sin(rot) * speed; }
          if (teclas['KeyD']) { miPos.x += Math.cos(rot) * speed; miPos.z -= Math.sin(rot) * speed; }

          // --- COLISIONES ---
          let choca = false;
          // Edificios
          obstaculos.forEach(obj => {
            let p = obj.object3D.position;
            let w = obj.getAttribute('width')/2 + 0.5;
            let d = obj.getAttribute('depth')/2 + 0.5;
            if (Math.abs(miPos.x - p.x) < w && Math.abs(miPos.z - p.z) < d) choca = true;
          });
          // Faroles
          faroles.forEach(obj => {
            let p = obj.object3D.position;
            let dist = Math.sqrt(Math.pow(miPos.x - p.x, 2) + Math.pow(miPos.z - p.z, 2));
            if (dist < 0.7) choca = true;
          });

          if (choca) { miPos.x = antX; miPos.z = antZ; }

          // Aplicar posición (Y es SIEMPRE 0)
          cuerpo.setAttribute('position', `${miPos.x} 0 ${miPos.z}`);

          // --- VILLANO SIGUE ---
          let vP = villano.object3D.position;
          vP.x += (miPos.x - vP.x) * 0.01;
          vP.z += (miPos.z - vP.z) * 0.01;
          villano.setAttribute('look-at', '#cuerpo');

          // --- RECOGER ---
          nenas.forEach(n => {
            if (n.getAttribute('visible') !== false) {
              let d = Math.sqrt(Math.pow(miPos.x - n.object3D.position.x, 2) + Math.pow(miPos.z - n.object3D.position.z, 2));
              if (d < 2) {
                n.setAttribute('visible', false);
                score++;
                document.querySelector('#puntos').innerText = score;
              }
            }
          });
        }
        requestAnimationFrame(frame);
      }
      frame();
    </script>
  </body>
</html>
