<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SHENRY CORE: VOID</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'serif', 'Times New Roman'; }
        
        #pantalla-inicio {
            position: fixed; width: 100%; height: 100%; 
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; color: #fff; text-align: center;
        }
        #nombre-input { 
            padding: 12px; font-size: 16px; background: transparent; 
            border: none; border-bottom: 1px solid #333; color: #4facfe; 
            margin-bottom: 30px; text-align: center; outline: none; width: 250px;
        }
        #btn-jugar { 
            padding: 12px 50px; background: transparent; color: #fff; 
            border: 1px solid #fff; cursor: pointer; font-size: 14px; 
            letter-spacing: 3px;
        }
        #hud {
            position: fixed; top: 30px; left: 30px; width: 300px;
            background: rgba(0, 0, 0, 0.7); padding: 20px;
            color: #eee; z-index: 100; pointer-events: none; 
            border-left: 2px solid #4facfe; display: none;
        }
        .proyecto-titulo { font-size: 12px; color: #4facfe; letter-spacing: 4px; margin-bottom: 10px; }
        #status-linterna { color: #ffaa00; font-size: 11px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <h1 style="font-size: 50px; letter-spacing: 15px; color: #4facfe;">SHENRY</h1>
        <input type="text" id="nombre-input" value="Shenry" maxlength="15">
        <button id="btn-jugar">CONECTAR</button>
    </div>

    <div id="hud">
        <div class="proyecto-titulo" id="display-nombre">PROYECTO: SHENRY</div>
        <div style="font-size: 13px;">● RESCATAR NIÑAS (<span id="count">0</span>/15)</div>
        <div id="status-linterna">LINTERNA: ACTIVA (P)</div>
    </div>

    <a-scene fog="type: exponential; color: #000; density: 0.08">
        
        <a-sky color="#020205"></a-sky>
        <a-entity id="stars-container"></a-entity>
        
        <a-sphere position="0 50 -100" radius="8" color="#fff" material="shader: flat; fog: false"></a-sphere>
        <a-light type="directional" color="#4facfe" intensity="0.3" position="0 50 -100"></a-light>

        <a-entity id="rig" position="0 0 5">
            <a-entity camera id="cam" look-controls="pointerLockEnabled: true" wasd-controls="acceleration: 80" position="0 1.6 0">
                
                <a-entity id="cuerpo" position="0 -1.2 -1.5">
                    <a-text value="S" color="#4facfe" align="center" width="10" font="exo2bold"
                            animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
                    </a-text>
                    <a-light type="point" color="#4facfe" intensity="0.8" distance="5"></a-light>
                    
                    <a-entity id="foco-luz" light="type: spot; intensity: 2; distance: 40; angle: 40" position="0 0.5 0"></a-entity>
                    <a-sphere id="vidrio" radius="0.05" color="#ffffaa" position="0 0.5 0" material="shader:flat; fog: false"></a-sphere>
                </a-entity>

                <a-entity cursor position="0 0 -1" geometry="primitive: ring; radiusInner: 0.005; radiusOuter: 0.008" material="color: #4facfe; shader: flat"></a-entity>
            </a-entity>
        </a-entity>

        <a-plane rotation="-90 0 0" width="2000" height="2000" color="#050505"></a-plane>
        
        <a-text class="niña" value="Y" position="5 1.2 -10" color="#ff69b4" align="center" width="12"></a-text>
        <a-text class="niña" value="Y" position="-10 1.2 -25" color="#ff69b4" align="center" width="12"></a-text>

        <a-entity id="franchis" position="0 1.8 -20">
            <a-text value="F" color="red" align="center" width="30" material="shader: flat"></a-text>
        </a-entity>

    </a-scene>

    <script>
        // Generador de estrellas corregido
        const starsContainer = document.getElementById('stars-container');
        for (let i = 0; i < 500; i++) {
            let star = document.createElement('a-sphere');
            let x = (Math.random() - 0.5) * 400;
            let y = Math.random() * 100 + 10;
            let z = (Math.random() - 0.5) * 400;
            star.setAttribute('position', {x: x, y: y, z: z});
            star.setAttribute('radius', Math.random() * 0.25);
            star.setAttribute('color', '#fff');
            star.setAttribute('material', 'shader: flat; fog: false');
            starsContainer.appendChild(star);
        }

        var jugando = false;
        var luzOk = true;
        var nenasCont = 0;

        document.getElementById('btn-jugar').addEventListener('click', () => {
            document.getElementById('display-nombre').innerText = "PROYECTO: " + document.getElementById('nombre-input').value.toUpperCase();
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            
            // Bloquear el mouse para mover la cámara libremente
            document.querySelector('a-scene').canvas.requestPointerLock();
            jugando = true;
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') e.preventDefault();
            if (e.key.toLowerCase() === 'p' && jugando) {
                luzOk = !luzOk;
                document.getElementById('foco-luz').setAttribute('light', 'intensity', luzOk ? 2 : 0);
                document.getElementById('vidrio').setAttribute('visible', luzOk);
                document.getElementById('status-linterna').innerText = "LINTERNA: " + (luzOk ? "ACTIVA (P)" : "OFF (P)");
            }
        });

        function tick() {
            if (!jugando) { requestAnimationFrame(tick); return; }
            var pPos = document.getElementById('rig').getAttribute('position');
            var v = document.getElementById('franchis');
            var vPos = v.getAttribute('position');

            // IA acechante
            var d = Math.sqrt(Math.pow(pPos.x-vPos.x,2) + Math.pow(pPos.z-vPos.z,2));
            if(d > 4) {
                vPos.x += (pPos.x - vPos.x) * 0.007;
                vPos.z += (pPos.z - vPos.z) * 0.007;
            }
            v.setAttribute('position', vPos);

            // Recoger Niñas
            document.querySelectorAll('.niña').forEach(n => {
                if(n.getAttribute('visible')){
                    let np = n.getAttribute('position');
                    if(Math.sqrt(Math.pow(pPos.x-np.x,2)+Math.pow(pPos.z-np.z,2)) < 2){
                        n.setAttribute('visible', false);
                        nenasCont++;
                        document.getElementById('count').innerText = nenasCont;
                    }
                }
            });

            requestAnimationFrame(tick);
        }
        tick();
    </script>
</body>
</html>
