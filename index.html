<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JICAMARCA: CAOS Y SALTO</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        .pantalla { position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; text-align: center; color: #00ffff; }
        #pantalla-inicio { background: radial-gradient(circle, #001a1a 0%, #000 100%); }
        #pantalla-muerte { background: #1a0000; display: none; color: #ff0000; }
        #pantalla-victoria { background: #001a00; display: none; color: #00ff00; }
        input { background:transparent; border:none; border-bottom:2px solid #00ffff; color:#fff; text-align:center; font-size:20px; outline:none; margin: 10px; }
        button { padding: 15px 45px; background: #000; color: #00ffff; border: 2px solid #00ffff; cursor: pointer; font-weight: bold; margin-top: 25px; transition: 0.4s; letter-spacing: 5px; }
        button:hover { background: #00ffff; color: #000; box-shadow: 0 0 25px #00ffff; transform: scale(1.05); }
        #btn-secreto { position: fixed; top: 0; left: 0; width: 50px; height: 50px; cursor: pointer; z-index: 3000; opacity: 0; }
        #foto-secreta { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 4000; justify-content: center; align-items: center; }
        #foto-secreta img { max-width: 80%; border: 5px solid #00ffff; }
        #hud { position: fixed; top: 20px; left: 20px; color: #fff; z-index: 100; display: none; background: rgba(0,0,0,0.8); padding: 15px; border-left: 4px solid #00ffff; }
    </style>
</head>
<body>

    <div id="btn-secreto"></div>
    <div id="foto-secreta" onclick="this.style.display='none'">
        <img src="https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=1000" alt="Secreto">
        <p style="position: absolute; bottom: 20px; color: #00ffff;">Clic para cerrar</p>
    </div>

    <div id="pantalla-inicio" class="pantalla">
        <h1 style="letter-spacing: 8px;">JICAMARCA MONSTER</h1>
        <label>TU NOMBRE:</label>
        <input type="text" id="nombre-input" value="Shenry">
        <label>NIÑAS A SALVAR:</label>
        <input type="number" id="cantidad-input" value="15">
        <button id="btn-jugar">SALVAR</button>
    </div>

    <div id="pantalla-muerte" class="pantalla">
        <h1>¡CAPTURADO!</h1>
        <button id="btn-respawn">REINTENTAR</button>
    </div>

    <div id="pantalla-victoria" class="pantalla">
        <h1 style="font-size: 60px;">¡GANASTE!</h1>
        <button onclick="location.reload()">VOLVER AL MENU</button>
    </div>

    <div id="hud">
        <div id="p-nombre" style="color:#00ffff; font-weight:bold;">-</div>
        <div>RESCATADAS: <span id="count">0</span> / <span id="total">0</span></div>
    </div>

    <a-scene fog="type: exponential; color: #000808; density: 0.15">
        <a-sky color="#000505"></a-sky>
        <a-entity id="rig" position="0 0 0">
            <a-entity camera id="cam" look-controls="pointerLockEnabled: true" wasd-controls="acceleration: 20" position="0 1.6 0">
                <a-entity id="cuerpo" position="0 -1.2 -1.5">
                    <a-text id="label-jugador" value="S" color="#00ffff" align="center" width="8"></a-text>
                    <a-entity id="foco" light="type: spot; intensity: 10; distance: 80; angle: 30; color: #00ffff"></a-entity>
                </a-entity>
            </a-entity>
        </a-entity>
        <a-circle rotation="-90 0 0" radius="105" color="#0a0a0a"></a-circle>
        <a-entity id="contenedor-niñas"></a-entity>
        <a-entity id="franchis" position="35 2 -35">
            <a-text id="txt-franchis" value="F" color="red" align="center" width="30"></a-text>
            <a-light type="point" color="red" intensity="1.5" distance="10"></a-light>
        </a-entity>
    </a-scene>

    <script>
        AFRAME.registerComponent('siempre-mirar', {
            tick: function () {
                var target = this.el.sceneEl.camera;
                if (target) this.el.object3D.lookAt(target.getWorldPosition(new THREE.Vector3()));
            }
        });

        let activo = false, movio = false, recolectadas = 0, totalObjetivo = 0;
        const LIMITE_MAPA = 100;
        
        // FISICAS DE SALTO
        let velY = 0;
        const gravedad = -0.015;
        const impulsoSalto = 0.3;
        let enSuelo = true;

        document.getElementById('btn-secreto').addEventListener('click', () => {
            document.getElementById('foto-secreta').style.display = 'flex';
        });

        function iniciarJuego() {
            const nombre = document.getElementById('nombre-input').value.toUpperCase() || "SHENRY";
            totalObjetivo = parseInt(document.getElementById('cantidad-input').value) || 1;
            recolectadas = 0; movio = false; velY = 0; enSuelo = true;
            document.getElementById('count').innerText = "0";
            document.getElementById('total').innerText = totalObjetivo;
            document.getElementById('p-nombre').innerText = "SUJETO: " + nombre;
            document.getElementById('label-jugador').setAttribute('value', nombre[0]);
            document.getElementById('rig').setAttribute('position', '0 0 0');
            document.getElementById('franchis').setAttribute('position', '40 2 -40');
            document.getElementById('txt-franchis').setAttribute('siempre-mirar', '');

            const nenasDiv = document.getElementById('contenedor-niñas');
            nenasDiv.innerHTML = '';
            for (let i = 0; i < totalObjetivo; i++) {
                let n = document.createElement('a-text');
                n.setAttribute('class', 'objetivo');
                n.setAttribute('value', 'Y');
                n.setAttribute('color', '#ffb3ff');
                n.setAttribute('width', '15');
                n.setAttribute('siempre-mirar', '');
                let ang = Math.random() * Math.PI * 2, r = Math.random() * 80;
                n.setAttribute('position', { x: Math.cos(ang)*r, y: 1.2, z: Math.sin(ang)*r });
                n.userData = { vx: (Math.random()-0.5)*0.05, vz: (Math.random()-0.5)*0.05 };
                nenasDiv.appendChild(n);
            }
            document.querySelectorAll('.pantalla').forEach(p => p.style.display = 'none');
            document.getElementById('hud').style.display = 'block';
            document.querySelector('a-scene').canvas.requestPointerLock();
            activo = true;
        }

        document.getElementById('btn-jugar').addEventListener('click', iniciarJuego);
        document.getElementById('btn-respawn').addEventListener('click', iniciarJuego);

        window.addEventListener('keydown', (e) => { 
            if(['w','a','s','d'].includes(e.key.toLowerCase())) movio = true;
            if(e.code === 'Space' && enSuelo && activo) {
                velY = impulsoSalto;
                enSuelo = false;
            }
        });

        function gameLoop() {
            if (!activo) { requestAnimationFrame(gameLoop); return; }

            const cam = document.getElementById('cam'), rig = document.getElementById('rig');
            const rigPos = rig.getAttribute('position');
            const camPos = new THREE.Vector3(); cam.object3D.getWorldPosition(camPos);
            const franchis = document.getElementById('franchis'), fPos = franchis.object3D.position;

            // PROCESAR SALTO
            if (!enSuelo) {
                velY += gravedad;
                rigPos.y += velY;
                if (rigPos.y <= 0) {
                    rigPos.y = 0;
                    velY = 0;
                    enSuelo = true;
                }
                rig.setAttribute('position', rigPos);
            }

            let targetPersecucion = camPos;

            const nenas = document.querySelectorAll('.objetivo');
            nenas.forEach(n => {
                if (n.getAttribute('visible') !== false) {
                    let nPos = n.object3D.position;
                    let distF = nPos.distanceTo(fPos), distS = nPos.distanceTo(camPos);

                    if (distF < 15) {
                        targetPersecucion = nPos;
                        n.userData.vx = (nPos.x - fPos.x) * 0.08;
                        n.userData.vz = (nPos.z - fPos.z) * 0.08;
                    } else if(Math.random() < 0.02) {
                        n.userData.vx = (Math.random()-0.5)*0.05;
                        n.userData.vz = (Math.random()-0.5)*0.05;
                    }
                    nPos.x += n.userData.vx; nPos.z += n.userData.vz;
                    if (Math.sqrt(nPos.x**2 + nPos.z**2) > LIMITE_MAPA) { nPos.x = -nPos.x * 0.9; nPos.z = -nPos.z * 0.9; }

                    if (distS < 5) {
                        n.setAttribute('visible', false); n.classList.remove('objetivo');
                        recolectadas++; document.getElementById('count').innerText = recolectadas;
                        if (recolectadas >= totalObjetivo) {
                            activo = false; document.exitPointerLock();
                            document.getElementById('pantalla-victoria').style.display = 'flex';
                        }
                    }
                }
            });

            if (movio) {
                let distJugador = fPos.distanceTo(camPos);
                let speed = (fPos.distanceTo(targetPersecucion) < 20) ? 0.015 : 0.003;
                
                if (targetPersecucion === camPos && fPos.distanceTo(camPos) < 20) {
                    cam.setAttribute('wasd-controls', 'acceleration', 45);
                } else {
                    cam.setAttribute('wasd-controls', 'acceleration', 20);
                }

                fPos.x += (targetPersecucion.x - fPos.x) * speed;
                fPos.z += (targetPersecucion.z - fPos.z) * speed;

                if (distJugador < 2) {
                    activo = false; document.exitPointerLock();
                    document.getElementById('pantalla-muerte').style.display = 'flex';
                }
            }

            if (Math.sqrt(camPos.x**2 + camPos.z**2) > LIMITE_MAPA) {
                rig.setAttribute('position', {x: -camPos.x * 0.9, y: rigPos.y, z: -camPos.z * 0.9});
            }

            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
