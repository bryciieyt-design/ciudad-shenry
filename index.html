<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Shenry: Noche en la Ciudad</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #050403; }
      #ui {
        position: fixed; top: 10px; left: 10px; color: #ff69b4;
        font-family: 'Courier New', monospace; font-size: 18px; z-index: 100;
        background: rgba(0,0,0,0.8); padding: 10px; border-radius: 4px; pointer-events: none;
      }
      #instrucciones {
        position: fixed; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); color: #ccc;
        display: flex; justify-content: center; align-items: center;
        z-index: 1000; font-family: sans-serif; text-align: center; cursor: pointer;
      }
    </style>
  </head>
  <body>

    <div id="instrucciones">
      <div>
        <h1 style="color: #fff;">CIUDAD LIMEÑA</h1>
        <p>Haz CLIC para iniciar</p>
        <p><b>W, A, S, D</b> para moverte | <b>ESPACIO</b> para saltar</p>
        <p>Las paredes son sólidas y Franchis Bri te seguirá.</p>
      </div>
    </div>

    <div id="ui">NIÑAS (Y): <span id="contador">0</span>/5</div>

    <a-scene fog="type: exponential; color: #0a0805; density: 0.04">
      <a-sky color="#0a0805"></a-sky>

      <a-entity id="rig" position="0 0 5">
        <a-entity id="player" camera look-controls="pointerLockEnabled: true" wasd-controls="acceleration: 60" position="0 1.6 0">
          <a-light type="spot" intensity="1.5" distance="30" angle="35" penumbra="0.5" color="#fff"></a-light>
          <a-entity cursor="fuse: false" position="0 0 -1" geometry="primitive: ring; radiusInner: 0.005; radiusOuter: 0.01" material="color: white; shader: flat"></a-entity>
        </a-entity>
      </a-entity>

      <a-plane id="piso" color="#080705" rotation="-90 0 0" width="2000" height="2000"></a-plane>

      <a-entity id="entorno">
        <a-box class="obstaculo" position="-12 10 -20" width="10" height="20" depth="10" color="#1a1510"></a-box>
        <a-box class="obstaculo" position="25 15 -45" width="12" height="30" depth="12" color="#221d18"></a-box>
        <a-box class="obstaculo" position="-30 8 30" width="15" height="16" depth="15" color="#1a1a1a"></a-box>
        <a-box class="obstaculo" position="35 15 15" width="8" height="30" depth="8" color="#14110f"></a-box>
        <a-box class="obstaculo" position="0 25 -100" width="40" height="50" depth="20" color="#050505"></a-box>
        
        <a-entity class="poste" position="8 0 -10">
            <a-cylinder color="#222" height="4" radius="0.2"></a-cylinder>
            <a-sphere position="0 4 0" radius="0.3" color="#ffaa00" material="shader: flat"></a-sphere>
            <a-light type="point" intensity="1.2" distance="18" color="#ffaa00" position="0 3.5 0"></a-light>
        </a-entity>

        <a-entity class="poste" position="-15 0 10">
            <a-cylinder color="#222" height="4" radius="0.2"></a-cylinder>
            <a-sphere position="0 4 0" radius="0.3" color="#ffaa00" material="shader: flat"></a-sphere>
            <a-light type="point" intensity="1.2" distance="18" color="#ffaa00" position="0 3.5 0"></a-light>
        </a-entity>
      </a-entity>

      <a-text class="salvable" value="Y" color="#ff69b4" position="5 1.5 -12" align="center" width="15" look-at="#player"></a-text>
      <a-text class="salvable" value="Y" color="#ff69b4" position="-20 1.5 -35" align="center" width="15" look-at="#player"></a-text>
      <a-text class="salvable" value="Y" color="#ff69b4" position="30 1.5 25" align="center" width="15" look-at="#player"></a-text>
      <a-text class="salvable" value="Y" color="#ff69b4" position="-40 1.5 5" align="center" width="15" look-at="#player"></a-text>
      <a-text class="salvable" value="Y" color="#ff69b4" position="0 1.5 -70" align="center" width="15" look-at="#player"></a-text>

      <a-entity id="villano" position="15 2 -25">
        <a-text value="X" color="#ff0000" align="center" width="25" look-at="#player"></a-text>
      </a-entity>

    </a-scene>

    <script>
      let score = 0;
      let activo = false;
      let vy = 0; // Velocidad vertical para el salto
      let saltando = false;
      let anterior = { x: 0, z: 5 };

      const rig = document.querySelector('#rig');
      const p = document.querySelector('#player');
      const v = document.querySelector('#villano');
      const ninas = document.querySelectorAll('.salvable');
      const cubos = document.querySelectorAll('.obstaculo');
      const postes = document.querySelectorAll('.poste');
      const cap = document.querySelector('#instrucciones');

      cap.addEventListener('click', () => {
        p.components['look-controls'].requestPointerLock();
        cap.style.display = 'none';
        activo = true;
      });

      // Lógica de Salto
      window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !saltando && activo) {
          vy = 0.25; 
          saltando = true;
        }
      });

      function loop() {
        if (!activo) { requestAnimationFrame(loop); return; }

        let rPos = rig.object3D.position;
        let vPos = v.object3D.position;

        // --- FÍSICA DE SALTO Y GRAVEDAD ---
        if (saltando) {
          rPos.y += vy;
          vy -= 0.01; // Gravedad
          if (rPos.y <= 0) {
            rPos.y = 0;
            saltando = false;
            vy = 0;
          }
        }

        // --- COLISIONES CON EDIFICIOS (BOX) ---
        cubos.forEach(box => {
          let b = box.object3D.position;
          let w = box.getAttribute('width') / 2 + 0.6;
          let d = box.getAttribute('depth') / 2 + 0.6;
          if (Math.abs(rPos.x - b.x) < w && Math.abs(rPos.z - b.z) < d) {
            rPos.x = anterior.x;
            rPos.z = anterior.z;
          }
        });

        // --- COLISIONES CON POSTES (RADIO) ---
        postes.forEach(post => {
          let fp = post.object3D.position;
          let dist = Math.sqrt(Math.pow(rPos.x - fp.x, 2) + Math.pow(rPos.z - fp.z, 2));
          if (dist < 0.8) {
            rPos.x = anterior.x;
            rPos.z = anterior.z;
          }
        });

        anterior.x = rPos.x;
        anterior.z = rPos.z;

        // --- BUCLE INFINITO DEL MAPA ---
        if (Math.abs(rPos.x) > 600) rPos.x *= -0.98;
        if (Math.abs(rPos.z) > 600) rPos.z *= -0.98;

        // --- VILLANO SIGUE A SHENRY (X ROJA) ---
        vPos.x += (rPos.x - vPos.x) * 0.012;
        vPos.z += (rPos.z - vPos.z) * 0.012;

        // --- RESCATE DE NIÑAS ---
        ninas.forEach(n => {
          if (n.getAttribute('visible') !== false) {
            let dist = Math.sqrt(Math.pow(rPos.x - n.object3D.position.x, 2) + Math.pow(rPos.z - n.object3D.position.z, 2));
            if (dist < 2.5) {
              n.setAttribute('visible', false);
              score++;
              document.querySelector('#contador').innerText = score;
              if(score >= 5) alert("¡Misión cumplida en la ciudad, Shenry!");
            }
          }
        });

        requestAnimationFrame(loop);
      }
      loop();
    </script>
  </body>
</html>
