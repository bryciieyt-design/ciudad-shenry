<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JICAMARCA: MULTIPLATAFORMA</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mneira10/aframe-joy-stick@master/dist/aframe-joy-stick-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }
        .pantalla { position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; text-align: center; color: #00ffff; }
        
        /* Menú de Dispositivo */
        #menu-dispositivo { background: #000; z-index: 3000; }
        .btn-dispositivo { padding: 20px 40px; font-size: 24px; margin: 20px; border: 3px solid #00ffff; background: transparent; color: #00ffff; cursor: pointer; transition: 0.3s; width: 250px; }
        .btn-dispositivo:hover { background: #00ffff; color: #000; }

        #pantalla-inicio { background: radial-gradient(circle, #001a1a 0%, #000 100%); display: none; }
        #pantalla-muerte { background: #1a0000; display: none; color: #ff0000; }
        #pantalla-victoria { background: #001a00; display: none; color: #00ff00; }
        #pantalla-pausa { background: rgba(0,0,0,0.9); display: none; color: #fff; border: 4px double #00ffff; }
        
        select, input { background: #000; border: 2px solid #00ffff; color: #fff; text-align: center; font-size: 18px; outline: none; margin: 10px; padding: 5px; }
        button { padding: 15px 45px; background: #000; color: #00ffff; border: 2px solid #00ffff; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.4s; letter-spacing: 2px; }
        
        #hud { position: fixed; top: 15px; left: 15px; color: #fff; z-index: 100; display: none; background: rgba(0,15,15,0.8); padding: 15px; border-left: 5px solid #00ffff; pointer-events: none; }
        #barra-vida-cont { width: 150px; height: 12px; background: rgba(255,255,255,0.1); margin-top: 5px; border: 1px solid #00ffff; }
        #barra-vida-fill { width: 100%; height: 100%; background: #00ffff; }

        /* Controles Mobile */
        #controles-mobile { position: fixed; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 1500; display: none; }
        .btn-mobile { position: absolute; pointer-events: auto; width: 70px; height: 70px; background: rgba(0,255,255,0.2); border: 2px solid #00ffff; border-radius: 50%; color: #fff; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        #btn-jump { bottom: 30px; right: 30px; width: 90px; height: 90px; }
        #btn-light { bottom: 130px; right: 30px; }
        #btn-pause-mob { top: 20px; right: 20px; border-radius: 10px; height: 40px; }
    </style>
</head>
<body>

    <div id="menu-dispositivo" class="pantalla">
        <h1 style="letter-spacing: 5px;">SELECCIONA PLATAFORMA</h1>
        <button class="btn-dispositivo" onclick="elegirModo('pc')">💻 PC</button>
        <button class="btn-dispositivo" onclick="elegirModo('mobile')">📱 CELULAR</button>
    </div>

    <div id="pantalla-inicio" class="pantalla">
        <h1 id="titulo">JICAMARCA MONSTER</h1>
        <label>OPERATIVO:</label>
        <input type="text" id="nombre-input" value="Shenry">
        <label>DIFICULTAD:</label>
        <select id="dificultad-select">
            <option value="10">FÁCIL</option>
            <option value="25" selected>NORMAL</option>
            <option value="50">DIFÍCIL</option>
        </select>
        <button id="btn-jugar">INICIAR OPERATIVO</button>
    </div>

    <div id="pantalla-pausa" class="pantalla">
        <h1>PAUSA</h1>
        <button id="btn-continuar">REANUDAR</button>
    </div>
    <div id="pantalla-muerte" class="pantalla"><h1>FIN DEL OPERATIVO</h1><button onclick="location.reload()">REINTENTAR</button></div>
    <div id="pantalla-victoria" class="pantalla"><h1>¡ÉXITO!</h1><button onclick="location.reload()">MENU</button></div>

    <div id="hud">
        <div id="p-nombre">-</div>
        <div>Y: <span id="count">0</span> / <span id="total">0</span></div>
        <div id="barra-vida-cont"><div id="barra-vida-fill"></div></div>
        <div style="font-size: 10px; margin-top: 5px;">HP: <span id="hp-text">100</span>%</div>
    </div>

    <div id="controles-mobile">
        <div id="btn-jump" class="btn-mobile">SALTO</div>
        <div id="btn-light" class="btn-mobile">LUZ</div>
        <div id="btn-pause-mob" class="btn-mobile">PAUSA</div>
    </div>

    <a-scene id="escena" fog="type: exponential; color: #000808; density: 0.15">
        <a-sky color="#000505"></a-sky>

        <a-entity id="rig" position="0 0 0">
            <a-entity camera id="cam" position="0 1.6 0" look-controls="pointerLockEnabled: true" wasd-controls="acceleration: 20">
                <a-entity id="cuerpo" position="0 -1.2 -1.5">
                    <a-text value="S" color="#00ffff" align="center" width="10"></a-text>
                    <a-entity id="linterna" light="type: spot; intensity: 12; distance: 85; color: #00ffff; penumbra: 0.6" visible="true"></a-entity>
                </a-entity>
            </a-entity>
        </a-entity>

        <a-circle rotation="-90 0 0" radius="115" color="#080808"></a-circle>
        <a-entity id="contenedor-niñas"></a-entity>
        <a-entity id="contenedor-curas"></a-entity>

        <a-entity id="franchis" position="35 3 -35">
            <a-text value="F" color="#ff0000" align="center" width="45" siempre-mirar></a-text>
            <a-light type="point" color="red" intensity="2.5" distance="18"></a-light>
        </a-entity>
    </a-scene>

    <script>
        let modoActual = 'pc';
        let activo = false, pausado = false, recolectadas = 0, totalObjetivo = 12;
        let salud = 100, dañoFranchis = 25, invulnerable = false, curasExtrasContador = 0;
        let velY = 0, enSuelo = true, linternaEncendida = true;
        const LIMITE_MAPA = 105, gravedad = -0.015, impulsoSalto = 0.3;

        // SELECTOR DE MODO
        function elegirModo(modo) {
            modoActual = modo;
            document.getElementById('menu-dispositivo').style.display = 'none';
            document.getElementById('pantalla-inicio').style.display = 'flex';
            
            const cam = document.getElementById('cam');
            if(modo === 'mobile') {
                document.getElementById('controles-mobile').style.display = 'block';
                // Configurar joystick y controles touch
                cam.removeAttribute('wasd-controls');
                document.getElementById('rig').setAttribute('joy-stick', '');
                cam.setAttribute('look-controls', 'magicWindowTrackingEnabled: false');
            }
        }

        AFRAME.registerComponent('siempre-mirar', {
            tick: function () {
                var target = this.el.sceneEl.camera;
                if (target) {
                    let p = new THREE.Vector3();
                    target.getWorldPosition(p);
                    this.el.object3D.lookAt(p);
                }
            }
        });

        function actualizarVida(valor) {
            salud = Math.max(0, Math.min(100, salud + valor));
            document.getElementById('barra-vida-fill').style.width = salud + "%";
            document.getElementById('hp-text').innerText = salud;
            if (salud <= 0 && activo) {
                activo = false;
                document.getElementById('pantalla-muerte').style.display = 'flex';
                if(modoActual === 'pc') document.exitPointerLock();
            }
        }

        function toggleLinterna() {
            if (!activo || pausado) return;
            linternaEncendida = !linternaEncendida;
            document.getElementById('linterna').setAttribute('visible', linternaEncendida);
            const escena = document.getElementById('escena');
            if (!linternaEncendida) {
                escena.setAttribute('fog', 'density', 1.5);
                document.querySelectorAll('.objetivo, .item-cura').forEach(o => o.setAttribute('visible', false));
            } else {
                escena.setAttribute('fog', 'density', 0.15);
                document.querySelectorAll('.objetivo, .item-cura').forEach(o => o.setAttribute('visible', true));
            }
        }

        function saltar() {
            if (enSuelo && activo && !pausado) { velY = impulsoSalto; enSuelo = false; }
        }

        function togglePausa() {
            if (!activo) return;
            pausado = !pausado;
            document.getElementById('pantalla-pausa').style.display = pausado ? 'flex' : 'none';
            if (modoActual === 'pc') {
                if (!pausado) document.querySelector('a-scene').canvas.requestPointerLock();
                else document.exitPointerLock();
            }
        }

        function spawnCuracion(cerca = false) {
            const container = document.getElementById('contenedor-curas');
            let h = document.createElement('a-text');
            h.setAttribute('value', 'H'); h.setAttribute('color', '#00ff00');
            h.setAttribute('align', 'center'); h.setAttribute('width', '25');
            h.setAttribute('class', 'item-cura'); h.setAttribute('siempre-mirar', '');
            let ang = Math.random() * Math.PI * 2;
            let r = cerca ? (12 + Math.random() * 8) : (Math.random() * 90);
            h.setAttribute('position', { x: Math.cos(ang)*r, y: 1.5, z: Math.sin(ang)*r });
            if (!linternaEncendida) h.setAttribute('visible', false);
            container.appendChild(h);
        }

        // EVENTOS PC
        window.addEventListener('keydown', (e) => { 
            if (e.key.toLowerCase() === 'p') toggleLinterna();
            if (e.code === 'Space') saltar();
            if (e.key === 'Escape') togglePausa();
        });

        // EVENTOS MOBILE
        document.getElementById('btn-jump').addEventListener('touchstart', saltar);
        document.getElementById('btn-light').addEventListener('touchstart', toggleLinterna);
        document.getElementById('btn-pause-mob').addEventListener('touchstart', togglePausa);

        document.getElementById('btn-jugar').addEventListener('click', () => {
            dañoFranchis = parseInt(document.getElementById('dificultad-select').value);
            document.getElementById('p-nombre').innerText = "OP: " + document.getElementById('nombre-input').value.toUpperCase();
            document.getElementById('total').innerText = totalObjetivo;
            
            for (let i = 0; i < totalObjetivo; i++) {
                let n = document.createElement('a-text');
                n.setAttribute('class', 'objetivo'); n.setAttribute('value', 'Y');
                n.setAttribute('color', '#ff69b4'); n.setAttribute('align', 'center'); n.setAttribute('width', '20'); n.setAttribute('siempre-mirar', '');
                let ang = Math.random() * Math.PI * 2, r = 25 + Math.random() * 70;
                n.setAttribute('position', { x: Math.cos(ang)*r, y: 1.5, z: Math.sin(ang)*r });
                n.userData = { vx: (Math.random()-0.5)*0.05, vz: (Math.random()-0.5)*0.05 };
                document.getElementById('contenedor-niñas').appendChild(n);
            }

            spawnCuracion(true); spawnCuracion(true);
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            if (modoActual === 'pc') document.querySelector('a-scene').canvas.requestPointerLock();
            activo = true;
        });

        document.getElementById('btn-continuar').addEventListener('click', togglePausa);

        function gameLoop() {
            if (!activo || pausado) { requestAnimationFrame(gameLoop); return; }

            const rig = document.getElementById('rig'), rigPos = rig.getAttribute('position');
            const camPos = new THREE.Vector3(); document.getElementById('cam').object3D.getWorldPosition(camPos);
            const fEntity = document.getElementById('franchis'), fPos = fEntity.object3D.position;

            if (!enSuelo) {
                velY += gravedad; rigPos.y += velY;
                if (rigPos.y <= 0) { rigPos.y = 0; velY = 0; enSuelo = true; }
                rig.setAttribute('position', rigPos);
            }

            let distJugador = fPos.distanceTo(camPos);
            let targetFranchis = (linternaEncendida || distJugador < 6) ? camPos : null;

            document.querySelectorAll('.objetivo').forEach(n => {
                let nPos = n.object3D.position;
                let dF = nPos.distanceTo(fPos);
                if (!targetFranchis && dF < 30) targetFranchis = nPos;
                if (dF < 15) { n.userData.vx = (nPos.x - fPos.x) * 0.08; n.userData.vz = (nPos.z - fPos.z) * 0.08; }
                nPos.x += n.userData.vx; nPos.z += n.userData.vz;
                if (nPos.distanceTo(camPos) < 5 && n.classList.contains('objetivo')) {
                    n.setAttribute('visible', false); n.classList.remove('objetivo');
                    recolectadas++; document.getElementById('count').innerText = recolectadas;
                    if (recolectadas >= totalObjetivo) {
                        activo = false; document.getElementById('pantalla-victoria').style.display = 'flex';
                    }
                }
            });

            document.querySelectorAll('.item-cura').forEach(c => {
                if (c.object3D.position.distanceTo(camPos) < 4) { actualizarVida(20); c.parentNode.removeChild(c); }
            });

            if (targetFranchis) {
                let speed = fPos.distanceTo(targetFranchis) < 20 ? 0.018 : 0.005;
                fPos.x += (targetFranchis.x - fPos.x) * speed; fPos.z += (targetFranchis.z - fPos.z) * speed;
            }

            if (!invulnerable && distJugador < 2.5) {
                actualizarVida(-dañoFranchis); invulnerable = true;
                setTimeout(() => invulnerable = false, 2000);
            }

            if (Math.sqrt(camPos.x**2 + camPos.z**2) > LIMITE_MAPA) {
                rig.setAttribute('position', {x: -camPos.x * 0.9, y: rigPos.y, z: -camPos.z * 0.9});
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
