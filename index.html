<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Shenry: The Fog of Lima</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        
        /* PANTALLA DE INICIO */
        #pantalla-inicio {
            position: fixed; width: 100%; height: 100%; background: #050505;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; color: #7a0000; text-align: center;
        }
        #pantalla-inicio h1 { font-size: 50px; letter-spacing: 10px; margin-bottom: 20px; }
        #nombre-input { 
            padding: 10px; font-size: 20px; background: #111; border: 1px solid #7a0000; 
            color: #ff69b4; margin-bottom: 20px; outline: none; text-align: center;
        }
        #btn-jugar { 
            padding: 15px 40px; font-size: 18px; background: #7a0000; color: white; 
            border: none; cursor: pointer; transition: 0.3s;
        }
        #btn-jugar:hover { background: #ff0000; box-shadow: 0 0 20px #ff0000; }

        /* HUD TRANSPARENTE */
        #hud {
            position: fixed; top: 20px; left: 20px; width: 300px;
            background: rgba(0, 0, 0, 0.4); padding: 20px; border-radius: 5px;
            color: #ddd; z-index: 100; pointer-events: none;
        }
        .proyecto-titulo { font-size: 14px; color: #ff69b4; margin-bottom: 10px; text-transform: uppercase; }
        .objetivo { margin: 10px 0; font-size: 16px; transition: 0.5s; }
        .completado { text-decoration: line-through; color: #7a0000; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <h1>SHENRY CORE</h1>
        <input type="text" id="nombre-input" value="Shenry" maxlength="15">
        <button id="btn-jugar">INICIAR RESCATE</button>
    </div>

    <div id="hud">
        <div class="proyecto-titulo" id="display-nombre">PROYECTO: SHENRY</div>
        <div id="obj1" class="objetivo">● RESCATAR NIÑAS (<span id="count">0</span>/15)</div>
        <div id="obj2" class="objetivo">● ELIMINAR A FRANCHIS BRI</div>
        <div id="obj3" class="objetivo">● ESCAPAR</div>
    </div>

    <a-scene fog="type: exponential; color: #050505; density: 0.08">
        <a-sky color="#050505"></a-sky>

        <a-entity id="rig" position="0 0 10">
            <a-entity id="camera" camera look-controls="pointerLockEnabled: true" position="0 1.6 0">
                <a-light type="spot" intensity="1.5" distance="25" angle="45" color="#fff"></a-light>
                <a-entity cursor="fuse: false" position="0 0 -1" 
                          geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015" 
                          material="color: #7a0000; shader: flat"></a-entity>
            </a-entity>
        </a-entity>

        <a-plane id="piso-pasto" position="0 -0.01 0" rotation="-90 0 0" width="100" height="100" color="#0a1a05"></a-plane>
        <a-plane id="piso-ciudad" position="0 -0.01 -150" rotation="-90 0 0" width="200" height="200" color="#111"></a-plane>

        <a-entity id="entorno-ciudad" position="0 0 -150">
            <a-box class="solido" position="-20 15 -20" width="15" height="30" depth="15" color="#1a1a1a"></a-box>
            <a-box class="solido" position="25 20 -50" width="20" height="40" depth="20" color="#0a0a0a"></a-box>
            <a-entity class="poste" position="10 0 -10">
                <a-cylinder color="#222" radius="0.2" height="5"></a-cylinder>
                <a-sphere position="0 5 0" radius="0.3" color="#ffaa00" material="shader:flat"></a-sphere>
                <a-light type="point" intensity="1.2" distance="15" color="#ffaa00" position="0 4.5 0"></a-light>
            </a-entity>
        </a-entity>

        <a-entity id="villano" position="0 2 -30">
            <a-text value="F" color="#7a0000" align="center" width="20" look-at="#camera"></a-text>
        </a-entity>

    </a-scene>

    <script>
        let activo = false;
        let pos = { x: 0, y: 0, z: 10 };
        let velY = 0;
        let saltando = false;
        let teclas = {};
        let nombreJugador = "Shenry";

        const btnJugar = document.getElementById('btn-jugar');
        const inputNombre = document.getElementById('nombre-input');
        const pantallaInicio = document.getElementById('pantalla-inicio');
        const displayNombre = document.getElementById('display-nombre');
        const rig = document.getElementById('rig');
        const cam = document.getElementById('camera');
        const villano = document.getElementById('villano');
        const solidos = document.querySelectorAll('.solido, .poste');

        btnJugar.addEventListener('click', () => {
            nombreJugador = inputNombre.value.toUpperCase();
            displayNombre.innerText = `PROYECTO: ${nombreJugador}`;
            pantallaInicio.style.display = 'none';
            cam.components['look-controls'].requestPointerLock();
            activo = true;
        });

        window.onkeydown = (e) => teclas[e.code] = true;
        window.onkeyup = (e) => teclas[e.code] = false;

        function update() {
            if (activo) {
                let antX = pos.x;
                let antZ = pos.z;
                
                let rotY = cam.getAttribute('rotation').y * Math.PI / 180;
                let speed = 0.14;

                // MOVIMIENTO WASD
                if (teclas['KeyW']) { pos.x -= Math.sin(rotY) * speed; pos.z -= Math.cos(rotY) * speed; }
                if (teclas['KeyS']) { pos.x += Math.sin(rotY) * speed; pos.z += Math.cos(rotY) * speed; }
                if (teclas['KeyA']) { pos.x -= Math.cos(rotY) * speed; pos.z += Math.sin(rotY) * speed; }
                if (teclas['KeyD']) { pos.x += Math.cos(rotY) * speed; pos.z -= Math.sin(rotY) * speed; }

                // SALTO
                if (teclas['Space'] && !saltando) { velY = 0.25; saltando = true; }
                if (saltando) {
                    pos.y += velY;
                    velY -= 0.01;
                    if (pos.y <= 0) { pos.y = 0; saltando = false; }
                }

                // COLISIONES FÍSICAS (CIUDAD)
                solidos.forEach(obj => {
                    let p = obj.object3D.position;
                    // Ajuste simple de colisión basado en el bioma ciudad
                    let distZ = Math.abs(pos.z - (p.z - 150));
                    let distX = Math.abs(pos.x - p.x);
                    if (distX < 5 && distZ < 5) { // Radio de colisión
                        pos.x = antX;
                        pos.z = antZ;
                    }
                });

                // APLICAR POSICIÓN
                rig.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);

                // IA FRANCHIS BRI (F)
                let vP = villano.object3D.position;
                vP.x += (pos.x - vP.x) * 0.008;
                vP.z += (pos.z - vP.z) * 0.008;

                // Bucle infinito (Teletransportación suave)
                if (pos.z < -400) pos.z = 50;
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
