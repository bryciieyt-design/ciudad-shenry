<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Shenry: Movimiento Base</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      #instrucciones {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        color: white; font-family: sans-serif; text-align: center;
        background: rgba(0,0,0,0.8); padding: 20px; z-index: 100;
        border: 2px solid #ff69b4; border-radius: 10px; pointer-events: none;
      }
    </style>
  </head>
  <body>

    <div id="instrucciones">
      <h1>MODO DE PRUEBA</h1>
      <p>1. Haz CLIC en cualquier parte de la pantalla</p>
      <p>2. Usa <b>W, A, S, D</b> para moverte</p>
      <p>3. Mueve el <b>MOUSE</b> para mirar</p>
    </div>

    <a-scene>
      <a-sky color="#111"></a-sky>

      <a-entity id="rig" position="0 0 0">
        <a-entity camera 
                  look-controls 
                  wasd-controls="acceleration: 100" 
                  position="0 1.6 0">
          <a-light type="point" intensity="1" distance="10" position="0 0 0"></a-light>
        </a-entity>
      </a-entity>

      <a-grid width="100" height="100" static-body></a-grid>
      
      <a-box position="0 0.5 -10" color="red"></a-box>

    </a-scene>

    <script>
      // Al hacer clic, ocultamos las instrucciones y bloqueamos el puntero
      document.body.addEventListener('click', function () {
        document.querySelector('#instrucciones').style.display = 'none';
      });
    </script>

  </body>
</html>
