<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Shenry: Ciudad de Hierro</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #050403; }
      #ui {
        position: fixed; top: 10px; left: 10px; color: #ff69b4;
        font-family: 'Courier New', monospace; font-size: 18px; z-index: 100;
        background: rgba(0,0,0,0.8); padding: 10px; border-radius: 4px; pointer-events: none;
      }
      #instrucciones {
        position: fixed; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); color: #ccc;
        display: flex; justify-content: center; align-items: center;
        z-index: 1000; font-family: sans-serif; text-align: center; cursor: pointer;
      }
    </style>
  </head>
  <body>

    <div id="instrucciones">
      <div>
        <h1 style="color: #fff;">CIUDAD LIMEÑA SÓLIDA</h1>
        <p>Haz CLIC para iniciar el rescate</p>
        <p><b>W, A, S, D</b> para caminar | <b>ESPACIO</b> para saltar</p>
        <p>El suelo y los muros son ahora infranqueables.</p>
      </div>
    </div>

    <div id="ui">RESCATES (Y): <span id="contador">0</span>/5</div>

    <a-scene fog="type: exponential; color: #0a0805; density: 0.04">
      <a-sky color="#0a0805"></a-sky>

      <a-entity id="rig" position="0 0 10">
        <a-entity id="player" camera look-controls="pointerLockEnabled: true" wasd-controls="acceleration: 65" position="0 1.6 0">
          <a-light type="spot" intensity="1.8" distance="35" angle="35" penumbra="0.5" color="#fff"></a-light>
          <a-entity cursor="fuse: false" position="0 0 -1" geometry="primitive: ring; radiusInner: 0.005; radiusOuter: 0.01" material="color: white; shader: flat"></a-entity>
        </a-entity>
      </a-entity>

      <a-plane id="piso" position="0 0 0" rotation="-90 0 0" width="4000" height="4000" color="#080705"></a-plane>

      <a-entity id="entorno">
        <a-box class="solido" position="-15 10 -25" width="10" height="20" depth="10" color="#1a1510"></a-box>
        <a-box class="solido" position="25 15 -50" width="12" height="30" depth="12" color="#221d18"></a-box>
        <a-box class="solido" position="-35 8 30" width="15" height="16" depth="15" color="#1a1a1a"></a-box>
        <a-box class="solido" position="45 15 20" width="8" height="30" depth="8" color="#14110f"></a-box>
        <a-box class="solido" position="0 25 -120" width="50" height="50" depth="25" color="#050505"></a-box>
        
        <a-entity class="poste" position="10 0 -15">
            <a-cylinder color="#222" height="4" radius="0.25"></a-cylinder>
            <a-sphere position="0 4 0" radius="0.3" color="#ffaa00" material="shader: flat"></a-sphere>
            <a-light type="point" intensity="1.5" distance="20" color="#ffaa00" position="0 3.8 0"></a-light>
        </a-entity>

        <a-entity class="poste" position="-20 0 15">
            <a-cylinder color="#222" height="4" radius="0.25"></a-cylinder>
            <a-sphere position="0 4 0" radius="0.3" color="#ffaa00" material="shader: flat"></a-sphere>
            <a-light type="point" intensity="1.5" distance="20" color="#ffaa00" position="0 3.8 0"></a-light>
        </a-entity>
      </a-entity>

      <a-text class="salvable" value="Y" color="#ff69b4" position="10 1.5 -10" align="center" width="15" look-at="#player"></a-text>
      <a-text class="salvable" value="Y" color="#ff69b4" position="-25 1.5 -35" align="center" width="15" look-at="#player"></a-text>
      <a-text class="salvable" value="Y" color="#ff69b4" position="35 1.5 15" align="center" width="15" look-at="#player"></a-text>
      <a-text class="salvable" value="Y" color="#ff69b4" position="-45 1.5 5" align="center" width="15" look-at="#player"></a-text>
      <a-text class="salvable" value="Y" color="#ff69b4" position="0 1.5 -80" align="center" width="15" look-at="#player"></a-text>

      <a-entity id="villano" position="20 2 -30">
        <a-text value="X" color="#ff0000" align="center" width="25" look-at="#player"></a-text>
      </a-entity>

    </a-scene>

    <script>
      let score = 0;
      let activo = false;
      let vy = 0; 
      let saltando = false;
      let posPrevia = { x: 0, z: 10 };

      const rig = document.querySelector('#rig');
      const p = document.querySelector('#player');
      const v = document.querySelector('#villano');
      const ninas = document.querySelectorAll('.salvable');
      const edificios = document.querySelectorAll('.solido');
      const postes = document.querySelectorAll('.poste');
      const cap = document.querySelector('#instrucciones');

      cap.addEventListener('click', () => {
        p.components['look-controls'].requestPointerLock();
        cap.style.display = 'none';
        activo = true;
      });

      // Tecla Espacio para Saltar
      window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !saltando && activo) {
          vy = 0.28; 
          saltando = true;
        }
      });

      function loop() {
        if (!activo) { requestAnimationFrame(loop); return; }

        let rPos = rig.object3D.position;

        // --- GRAVEDAD Y SALTO (IMPIDE CAER) ---
        if (saltando) {
          rPos.y += vy;
          vy -= 0.015; // Fuerza de gravedad
          if (rPos.y <= 0) {
            rPos.y = 0;
            saltando = false;
            vy = 0;
          }
        } else {
            rPos.y = 0; // Forzar contacto con el suelo
        }

        // --- COLISIONES CON EDIFICIOS ---
        edificios.forEach(box => {
          let b = box.object3D.position;
          let w = box.getAttribute('width') / 2 + 0.7;
          let d = box.getAttribute('depth') / 2 + 0.7;
          if (Math.abs(rPos.x - b.x) < w && Math.abs(rPos.z - b.z) < d) {
            rPos.x = posPrevia.x;
            rPos.z = posPrevia.z;
          }
        });

        // --- COLISIONES CON POSTES ---
        postes.forEach(post => {
          let fp = post.object3D.position;
          let dist = Math.sqrt(Math.pow(rPos.x - fp.x, 2) + Math.pow(rPos.z - fp.z, 2));
          if (dist < 0.9) {
            rPos.x = posPrevia.x;
            rPos.z = posPrevia.z;
          }
        });

        // Guardar posición segura
        posPrevia.x = rPos.x;
        posPrevia.z = rPos.z;

        // --- VILLANO PERSIGUIENDO (X ROJA) ---
        let vPos = v.object3D.position;
        vPos.x += (rPos.x - vPos.x) * 0.015;
        vPos.z += (rPos.z - vPos.z) * 0.015;

        // --- SISTEMA INFINITO ---
        if (Math.abs(rPos.x) > 1000) rPos.x *= -0.95;
        if (Math.abs(rPos.z) > 1000) rPos.z *= -0.95;

        // --- RESCATE ---
        ninas.forEach(n => {
          if (n.getAttribute('visible') !== false) {
            let dist = Math.sqrt(Math.pow(rPos.x - n.object3D.position.x, 2) + Math.pow(rPos.z - n.object3D.position.z, 2));
            if (dist < 2.8) {
              n.setAttribute('visible', false);
              score++;
              document.querySelector('#contador').innerText = score;
              if(score >= 5) alert("¡Misión cumplida en la noche limeña!");
            }
          }
        });

        requestAnimationFrame(loop);
      }
      loop();
    </script>
  </body>
</html>
